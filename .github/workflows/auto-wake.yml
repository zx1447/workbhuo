name: Keep WorkBuddy DevTop Alive (保活 + 自动唤醒)

on:
  schedule:
    - cron: '*/14 * * * *'   # 每 14 分钟检查一次
  workflow_dispatch:

env:
  WEBTOP_URL: ${{ secrets.WEBTOP_URL }}
  WEBTOP_USER: ${{ secrets.WEBTOP_USER }}
  WEBTOP_PASSWORD: ${{ secrets.WEBTOP_PASSWORD }}
  SANDBOX_ID: affbdd3a0a5c400597ee8e858a624486
  BASE: https://webview.e2b.gz3.sandbox.cloudstudio.club
  # 正确的启动 URL: /?restart=true（非 /dashboard?restart=true）
  RESTART_URL: https://webview.e2b.gz3.sandbox.cloudstudio.club/?restart=true

jobs:
  keepalive-and-wake:
    runs-on: ubuntu-latest
    steps:
      - name: 探测桌面是否在线
        id: probe
        run: |
          code=$(curl -sS -m 90 -o /dev/null -w '%{http_code}' -u "$WEBTOP_USER:$WEBTOP_PASSWORD" "$WEBTOP_URL")
          echo "桌面探测状态码: $code"
          if [ "$code" = "200" ] || [ "$code" = "301" ] || [ "$code" = "302" ]; then
            echo "online=true" >> "$GITHUB_OUTPUT"
            echo "✅ 沙箱在线，保活成功"
          else
            echo "online=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ 桌面不可达 (状态码 $code)，准备自动唤醒..."
          fi

      - name: 保活成功 → 结束
        if: steps.probe.outputs.online == 'true'
        run: echo "无需操作，沙箱正常运行中"

      - name: 沙箱离线 → 无头浏览器点击「立即启动」
        if: steps.probe.outputs.online == 'false'
        timeout-minutes: 12
        run: |
          pip install --quiet playwright
          playwright install --with-deps chromium
          python3 - <<'PY'
          import os, time
          from playwright.sync_api import sync_playwright

          BASE     = os.environ['BASE']
          url      = os.environ['WEBTOP_URL']
          user     = os.environ['WEBTOP_USER']
          pwd      = os.environ['WEBTOP_PASSWORD']
          restart  = os.environ['RESTART_URL']

          with sync_playwright() as p:
              b   = p.chromium.launch()
              ctx = b.new_context(http_credentials={"username": user, "password": pwd})
              page = ctx.new_page()

              print("[1] 打开桌面:", url)
              page.goto(url, wait_until="load", timeout=60000)
              time.sleep(4)

              # 尝试多种方式点击「立即启动」按钮
              clicked = False
              selectors = [
                  "text=立即启动",
                  ".button.button-primary:has-text('立即启动')",
                  'button[aria-label="立即启动"]',
                  'button[name="立即启动"]',
              ]
              for sel in selectors:
                  try:
                      btn = page.locator(sel)
                      if btn.count() > 0 and btn.is_visible(timeout=5000):
                          btn.click()
                          clicked = True
                          print(f"[2] ✅ 已点击「立即启动」(选择器: {sel})")
                          break
                  except Exception as e:
                      continue

              if not clicked:
                  print("[2] ⚠️ 未定位到「立即启动」按钮，改为直接访问 ?restart=true 端点")
                  try:
                      page.goto(restart, timeout=30000)
                      print(f"[2] 已访问: {restart} (无 cookie / 无 auth)")
                  except Exception as e:
                      print(f"[2] restart 访问异常: {e}")

              # 等待沙箱启动
              print("[3] 等待沙箱恢复...")
              time.sleep(30)

              b.close()
          PY

      - name: 唤醒后复探确认
        if: steps.probe.outputs.online == 'false'
        run: |
          sleep 10
          code=$(curl -sS -m 90 -o /dev/null -w '%{http_code}' -u "$WEBTOP_USER:$WEBTOP_PASSWORD" "$WEBTOP_URL")
          echo "唤醒后状态码: $code"
          if [ "$code" = "200" ] || [ "$code" = "301" ] || [ "$code" = "302" ]; then
            echo "✅ 沙箱已恢复在线"
          else
            echo "⚠️ 仍不可达 ($code)，可能需要更长时间或手动操作"
          fi
