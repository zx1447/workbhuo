name: Auto-Wake DevTop (Python 浏览器登录控制台启动)

on:
  schedule:
    - cron: '*/14 * * * *'   # 每 14 分钟
  workflow_dispatch:

env:
  # 规范地址(带 x-cs-sandbox-id 参数)，302 = 在线
  WEBTOP_URL: https://webview.e2b.gz3.sandbox.cloudstudio.club/?x-cs-sandbox-id=affbdd3a0a5c400597ee8e858a624486&x-cs-sandbox-port=3000
  WEBTOP_USER: ${{ secrets.WEBTOP_USER }}
  WEBTOP_PASSWORD: ${{ secrets.WEBTOP_PASSWORD }}
  # 控制台启动所需鉴权（二选一，优先 Cookie）
  CONSOLE_URL: ${{ secrets.CONSOLE_URL }}
  SPACE_KEY: affbdd3a0a5c400597ee8e858a624486
  CLOUDSTUDIO_COOKIE: ${{ secrets.CLOUDSTUDIO_COOKIE }}
  CLOUDSTUDIO_USER: ${{ secrets.CLOUDSTUDIO_USER }}
  CLOUDSTUDIO_PASS: ${{ secrets.CLOUDSTUDIO_PASS }}

jobs:
  wake:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库(含唤醒脚本)
        uses: actions/checkout@v4

      - name: 探测桌面 (仅 302 算真正在线)
        id: probe
        run: |
          code=$(curl -sS -m 90 -o /dev/null -w '%{http_code}' -u "$WEBTOP_USER:$WEBTOP_PASSWORD" "$WEBTOP_URL")
          echo "探测状态码: $code"
          if [ "$code" = "302" ]; then
            echo "online=true" >> "$GITHUB_OUTPUT"
            echo "✅ 沙箱在线 (302)"
          else
            echo "online=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ 状态码 $code → 视为离线，准备用浏览器登录控制台启动"
          fi

      - name: Python 无头浏览器登录控制台点击「启动」
        if: steps.probe.outputs.online == 'false'
        timeout-minutes: 15
        run: |
          pip install --quiet playwright
          playwright install --with-deps chromium
          python wake_cloudstudio.py

      - name: 唤醒后复探确认
        if: steps.probe.outputs.online == 'false'
        run: |
          sleep 10
          code=$(curl -sS -m 90 -o /dev/null -w '%{http_code}' -u "$WEBTOP_USER:$WEBTOP_PASSWORD" "$WEBTOP_URL")
          echo "唤醒后状态码: $code"
          if [ "$code" = "302" ]; then
            echo "✅ 沙箱已恢复在线"
          else
            echo "⚠️ 仍不可达 ($code) —— 检查 CLOUDSTUDIO_COOKIE / 控制台账号 是否失效，或 CONSOLE_URL / 启动按钮选择器是否需要调整"
          fi
