name: Keep WorkBuddy DevTop Alive

on:
  schedule:
    - cron: '*/30 * * * *'   # 每 30 分钟访问一次
  workflow_dispatch:         # 支持在 Actions 页面手动触发

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: 访问开发桌面 (Basic Auth 保活)
        env:
          URL: ${{ secrets.WEBTOP_URL }}
          USER: ${{ secrets.WEBTOP_USER }}
          PASS: ${{ secrets.WEBTOP_PASSWORD }}
        run: |
          echo "开始保活探测..."
          code=""
          for i in 1 2 3; do
            code=$(curl -sS -m 90 -o /dev/null -w '%{http_code}' -u "$USER:$PASS" "$URL")
            echo "第 $i 次探测 -> HTTP 状态码: $code"
            if [ "$code" = "200" ] || [ "$code" = "301" ] || [ "$code" = "302" ]; then
              break
            fi
            sleep 5
          done
          if [ "$code" = "200" ] || [ "$code" = "301" ] || [ "$code" = "302" ]; then
            echo "✅ 沙箱在线，保活成功 (状态码 $code)"
          else
            echo "⚠️ 返回 $code（沙箱可能已休眠，需手动点 CloudStudio 启动）"
          fi
