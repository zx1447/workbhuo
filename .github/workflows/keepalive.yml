name: Keep WorkBuddy DevTop Alive

on:
  schedule:
    - cron: '*/14 * * * *'   # 每 14 分钟
  workflow_dispatch:

env:
  WEBTOP_URL: ${{ secrets.WEBTOP_URL }}
  WEBTOP_USER: ${{ secrets.WEBTOP_USER }}
  WEBTOP_PASSWORD: ${{ secrets.WEBTOP_PASSWORD }}
  # 正确的启动端点: /?restart=true (沙箱停止时返回 200 并唤醒)
  RESTART_URL: https://webview.e2b.gz3.sandbox.cloudstudio.club/?restart=true

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: 探测桌面 (仅 302 算真正在线)
        id: probe
        run: |
          code=$(curl -sS -m 90 -o /dev/null -w '%{http_code}' -u "$WEBTOP_USER:$WEBTOP_PASSWORD" "$WEBTOP_URL")
          echo "探测状态码: $code"
          # 沙箱运行时 webtop 返回 302(basic-auth 重定向); 停止时返回 404/其他
          if [ "$code" = "302" ]; then
            echo "online=true" >> "$GITHUB_OUTPUT"
            echo "✅ 沙箱在线 (302, webtop 正常服务)"
          else
            echo "online=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ 状态码 $code → 视为离线，准备唤醒"
          fi

      - name: 离线则调 ?restart=true 唤醒
        if: steps.probe.outputs.online == 'false'
        run: |
          echo "调用启动端点: $RESTART_URL"
          rcode=$(curl -sS -m 60 -o /dev/null -w '%{http_code}' "$RESTART_URL")
          echo "启动端点返回: $rcode"
          sleep 30
          code2=$(curl -sS -m 90 -o /dev/null -w '%{http_code}' -u "$WEBTOP_USER:$WEBTOP_PASSWORD" "$WEBTOP_URL")
          if [ "$code2" = "302" ]; then
            echo "✅ 沙箱已恢复在线"
          else
            echo "⚠️ 仍不可达 ($code2)"
          fi
